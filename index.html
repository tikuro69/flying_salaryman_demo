<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>Flying Salaryman Demo</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: skyblue;
    }

    #info {
      position: absolute;
      top: 12px;
      left: 12px;
      color: white;
      font-family: sans-serif;
      background: rgba(0, 0, 0, 0.3);
      padding: 8px 12px;
      border-radius: 8px;
      user-select: none;
    }

    #daysOffCounter {
      position: absolute;
      top: 12px;
      right: 12px;
      color: white;
      font-family: sans-serif;
      font-weight: 700;
      background: rgba(0, 0, 0, 0.28);
      padding: 8px 12px;
      border-radius: 8px;
      user-select: none;
    }

    #statusMessage {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: white;
      font-family: sans-serif;
      font-size: clamp(28px, 5vw, 58px);
      font-weight: 800;
      line-height: 1.1;
      text-align: center;
      text-shadow: 0 3px 12px rgba(0, 0, 0, 0.45);
      white-space: pre-line;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.6s ease;
      user-select: none;
    }

    #statusMessage.visible {
      opacity: 1;
    }
  </style>
</head>
<body>
<div id="info">Arrow keys: fly / move</div>
<div id="daysOffCounter">Days Off: 0 / 10</div>
<div id="statusMessage"></div>

<script type="module">
import * as THREE from "https://unpkg.com/three@0.160.0/build/three.module.js";

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87ceeb);
scene.fog = new THREE.Fog(0x87ceeb, 20, 150);

const camera = new THREE.PerspectiveCamera(
  70,
  window.innerWidth / window.innerHeight,
  0.1,
  1000
);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// light
const light = new THREE.DirectionalLight(0xffffff, 1.2);
light.position.set(5, 10, 7);
scene.add(light);

const ambient = new THREE.AmbientLight(0xffffff, 0.7);
scene.add(ambient);

// ground
const groundGeo = new THREE.PlaneGeometry(500, 500);
const groundMat = new THREE.MeshLambertMaterial({ color: 0x66aa66 });
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.position.y = -8;
scene.add(ground);

// materials
const suitMat = new THREE.MeshLambertMaterial({ color: 0x111122 });
const skinMat = new THREE.MeshLambertMaterial({ color: 0xffcc99 });
const tieMat = new THREE.MeshLambertMaterial({ color: 0xcc0000 });
const cloudMat = new THREE.MeshLambertMaterial({ color: 0xffffff });
const buildingMat = new THREE.MeshLambertMaterial({ color: 0x667788 });
const birdMat = new THREE.MeshLambertMaterial({ color: 0x222222 });
buildingMat.transparent = true;

// --------------------------------------------------
// sea ending scene
// --------------------------------------------------

const seaMat = new THREE.MeshLambertMaterial({
  color: 0x1e88c8,
  transparent: true,
  opacity: 0
});
const sea = new THREE.Mesh(new THREE.PlaneGeometry(700, 420), seaMat);
sea.rotation.x = -Math.PI / 2;
sea.position.set(0, -7.9, -170);
scene.add(sea);

const horizonMat = new THREE.MeshBasicMaterial({
  color: 0xf4fbff,
  transparent: true,
  opacity: 0
});
const horizon = new THREE.Mesh(new THREE.PlaneGeometry(520, 0.35), horizonMat);
horizon.position.set(0, 5.4, -210);
scene.add(horizon);

const daysOffCounter = document.getElementById("daysOffCounter");
const statusMessage = document.getElementById("statusMessage");

// --------------------------------------------------
// DAY OFF game state
// --------------------------------------------------

const DAYS_OFF_GOAL = 10;
const MAX_DAY_OFF_CARDS = 5;
const dayOffCards = [];
const dayOffTexture = createDayOffTexture();
const cardGlowMat = new THREE.MeshBasicMaterial({
  color: 0xffffaa,
  transparent: true,
  opacity: 0.0,
  side: THREE.DoubleSide
});

let gameState = "playing";
let daysOffCollected = 0;
let nextCardSpawnAt = 5.0;
let autopilotStartedAt = 0;

function updateDaysOffCounter() {
  daysOffCounter.textContent = `Days Off: ${daysOffCollected} / ${DAYS_OFF_GOAL}`;
}

function setStatusMessage(text, visible = true) {
  statusMessage.textContent = text;
  statusMessage.classList.toggle("visible", visible);
}

function createDayOffTexture() {
  const canvas = document.createElement("canvas");
  canvas.width = 512;
  canvas.height = 320;

  const ctx = canvas.getContext("2d");
  ctx.fillStyle = "#ffffff";
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.strokeStyle = "#1d3557";
  ctx.lineWidth = 18;
  ctx.strokeRect(16, 16, canvas.width - 32, canvas.height - 32);
  ctx.fillStyle = "#1d3557";
  ctx.font = "bold 82px Arial, sans-serif";
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";
  ctx.fillText("DAY OFF", canvas.width / 2, canvas.height / 2);
  ctx.fillStyle = "#e63946";
  ctx.font = "bold 26px Arial, sans-serif";
  ctx.fillText("PAID LEAVE", canvas.width / 2, canvas.height / 2 + 82);

  const texture = new THREE.CanvasTexture(canvas);
  texture.colorSpace = THREE.SRGBColorSpace;
  return texture;
}

function createDayOffCard() {
  const card = new THREE.Group();
  const cardMat = new THREE.MeshBasicMaterial({
    map: dayOffTexture,
    side: THREE.DoubleSide,
    transparent: true,
    opacity: 1
  });

  const face = new THREE.Mesh(new THREE.PlaneGeometry(3.0, 1.9), cardMat);
  card.add(face);

  const glow = new THREE.Mesh(new THREE.PlaneGeometry(3.35, 2.18), cardGlowMat.clone());
  glow.position.z = -0.02;
  card.add(glow);

  card.userData = {
    face,
    glow,
    collected: false,
    collectTime: 0,
    spinOffset: Math.random() * Math.PI * 2,
    floatOffset: Math.random() * Math.PI * 2
  };

  resetDayOffCard(card);
  scene.add(card);
  dayOffCards.push(card);
}

function resetDayOffCard(card) {
  card.position.set(
    flightRig.position.x + Math.random() * 24 - 12,
    clamp(flightRig.position.y + Math.random() * 12 - 4, 1, 22),
    -55 - Math.random() * 70
  );
  card.rotation.set(
    Math.random() * 0.2 - 0.1,
    Math.random() * 0.5 - 0.25,
    Math.random() * 0.2 - 0.1
  );
  card.scale.set(1, 1, 1);
  card.visible = true;
  card.userData.collected = false;
  card.userData.collectTime = 0;
  card.userData.face.material.opacity = 1;
  card.userData.glow.material.opacity = 0.0;
}

function spawnDayOffCards() {
  if (gameState !== "playing" || time < 4.5 || time < nextCardSpawnAt) return;

  if (dayOffCards.length < MAX_DAY_OFF_CARDS) {
    createDayOffCard();
  }

  nextCardSpawnAt = time + 1.0 + Math.random() * 1.4;
}

function updateDayOffCards() {
  for (let i = dayOffCards.length - 1; i >= 0; i--) {
    const card = dayOffCards[i];
    const data = card.userData;

    if (data.collected) {
      data.collectTime += 0.016;
      const pop = clamp(data.collectTime / 0.35, 0, 1);
      const scale = 1 + pop * 0.9;

      card.scale.set(scale, scale, scale);
      card.rotation.z += 0.22;
      data.face.material.opacity = 1 - pop;
      data.glow.material.opacity = 0.55 * (1 - pop);

      if (pop >= 1) {
        scene.remove(card);
        data.face.geometry.dispose();
        data.face.material.dispose();
        data.glow.geometry.dispose();
        data.glow.material.dispose();
        dayOffCards.splice(i, 1);
      }
      continue;
    }

    if (gameState !== "playing") {
      card.position.z += 0.34;
      data.face.material.opacity = lerp(data.face.material.opacity, 0, 0.08);
      data.glow.material.opacity = 0;

      if (data.face.material.opacity < 0.05) {
        scene.remove(card);
        data.face.geometry.dispose();
        data.face.material.dispose();
        data.glow.geometry.dispose();
        data.glow.material.dispose();
        dayOffCards.splice(i, 1);
      }
      continue;
    }

    card.position.z += 0.32;
    card.rotation.y = Math.sin(time * 1.8 + data.spinOffset) * 0.35;
    card.rotation.z = Math.sin(time * 1.2 + data.spinOffset) * 0.08;
    card.position.y += Math.sin(time * 2.4 + data.floatOffset) * 0.012;

    if (card.position.distanceTo(flightRig.position) < 2.0 && gameState === "playing") {
      collectDayOffCard(card);
      continue;
    }

    if (card.position.z > 24) {
      resetDayOffCard(card);
    }
  }
}

function collectDayOffCard(card) {
  if (card.userData.collected || gameState !== "playing") return;

  card.userData.collected = true;
  card.userData.collectTime = 0;
  daysOffCollected += 1;
  updateDaysOffCounter();

  if (daysOffCollected >= DAYS_OFF_GOAL) {
    startAutopilot();
  }
}

function startAutopilot() {
  gameState = "autopilot";
  autopilotStartedAt = time;
  velX = 0;
  velY = 0;
  setStatusMessage("10 DAYS OFF\nAUTOPILOT ENGAGED");
}

function updateAutopilot(floatMotion) {
  const elapsed = time - autopilotStartedAt;

  flightRig.position.x = lerp(flightRig.position.x, 0, 0.015);
  flightRig.position.y = lerp(flightRig.position.y, 23, 0.006);
  flightRig.position.z -= 0.20 + Math.min(elapsed, 8) * 0.012;

  flightRig.rotation.x = lerp(flightRig.rotation.x, 0.16, 0.02);
  flightRig.rotation.y = lerp(flightRig.rotation.y, 0, 0.02);
  flightRig.rotation.z = lerp(flightRig.rotation.z, 0, 0.03);

  headDive = lerp(headDive, 0, 0.06);
  bodyDive = lerp(bodyDive, 0, 0.06);
  legLag = lerp(legLag, 0, 0.05);
  kneeLag = lerp(kneeLag, 0, 0.05);
  setFlyingPose(floatMotion, headDive, bodyDive, legLag, kneeLag);

  const disappear = clamp((elapsed - 8.0) / 3.5, 0, 1);
  const scale = lerp(1, 0.12, disappear);
  flightRig.scale.set(scale, scale, scale);

  if (elapsed > 10.8 && gameState === "autopilot") {
    gameState = "ending";
    setStatusMessage("At last, the sea.");
  }
}

// --------------------------------------------------
// flight rig
// --------------------------------------------------
// flightRig: 位置と進行方向を担当
// man: サラリーマンの見た目と飛行ポーズを担当

const flightRig = new THREE.Group();
scene.add(flightRig);

const man = new THREE.Group();
flightRig.add(man);

// body
const body = new THREE.Mesh(
  new THREE.BoxGeometry(1.0, 1.8, 0.45),
  suitMat
);
body.position.y = 0;
man.add(body);

// head
const head = new THREE.Mesh(
  new THREE.SphereGeometry(0.38, 24, 24),
  skinMat
);
head.position.y = 1.25;
man.add(head);

// tie
const tie = new THREE.Mesh(
  new THREE.BoxGeometry(0.18, 0.7, 0.06),
  tieMat
);
tie.position.set(0, 0.35, -0.26);
man.add(tie);

// arms with pivots
const leftArmPivot = new THREE.Group();
leftArmPivot.position.set(-0.55, 0.55, 0);
man.add(leftArmPivot);

const leftArm = new THREE.Mesh(
  new THREE.BoxGeometry(1.35, 0.18, 0.18),
  suitMat
);
leftArm.position.x = -0.68;
leftArmPivot.add(leftArm);

const rightArmPivot = new THREE.Group();
rightArmPivot.position.set(0.55, 0.55, 0);
man.add(rightArmPivot);

const rightArm = new THREE.Mesh(
  new THREE.BoxGeometry(1.35, 0.18, 0.18),
  suitMat
);
rightArm.position.x = 0.68;
rightArmPivot.add(rightArm);

// legs with pivots
const leftLegPivot = new THREE.Group();
leftLegPivot.position.set(-0.25, -0.9, 0);
man.add(leftLegPivot);

const leftLeg = new THREE.Mesh(
  new THREE.BoxGeometry(0.25, 1.15, 0.25),
  suitMat
);
leftLeg.position.y = -0.58;
leftLegPivot.add(leftLeg);

const rightLegPivot = new THREE.Group();
rightLegPivot.position.set(0.25, -0.9, 0);
man.add(rightLegPivot);

const rightLeg = new THREE.Mesh(
  new THREE.BoxGeometry(0.25, 1.15, 0.25),
  suitMat
);
rightLeg.position.y = -0.58;
rightLegPivot.add(rightLeg);

// initial position
flightRig.position.set(0, -6, 0);

// --------------------------------------------------
// clouds
// --------------------------------------------------

const clouds = [];

function createCloud(x, y, z) {
  const cloud = new THREE.Group();

  for (let i = 0; i < 4; i++) {
    const puff = new THREE.Mesh(
      new THREE.SphereGeometry(0.7 + Math.random() * 0.45, 16, 16),
      cloudMat
    );
    puff.position.set(i * 0.65, Math.random() * 0.25, Math.random() * 0.25);
    cloud.add(puff);
  }

  cloud.position.set(x, y, z);
  scene.add(cloud);
  clouds.push(cloud);
}

for (let i = 0; i < 24; i++) {
  createCloud(
    Math.random() * 90 - 45,
    Math.random() * 24 + 1,
    Math.random() * -150
  );
}

// --------------------------------------------------
// city
// --------------------------------------------------

const buildings = [];

for (let i = 0; i < 80; i++) {
  const h = Math.random() * 12 + 3;

  const b = new THREE.Mesh(
    new THREE.BoxGeometry(2, h, 2),
    buildingMat
  );

  b.position.set(
    Math.random() * 110 - 55,
    -8 + h / 2,
    Math.random() * -150
  );

  scene.add(b);
  buildings.push(b);
}

// --------------------------------------------------
// birds
// --------------------------------------------------

const birds = [];

function createBird(x, y, z) {
  const bird = new THREE.Group();

  const leftWing = new THREE.Mesh(
    new THREE.BoxGeometry(0.8, 0.06, 0.06),
    birdMat
  );
  leftWing.rotation.z = 0.35;
  leftWing.position.x = -0.35;
  bird.add(leftWing);

  const rightWing = new THREE.Mesh(
    new THREE.BoxGeometry(0.8, 0.06, 0.06),
    birdMat
  );
  rightWing.rotation.z = -0.35;
  rightWing.position.x = 0.35;
  bird.add(rightWing);

  bird.position.set(x, y, z);
  scene.add(bird);
  birds.push(bird);
}

for (let i = 0; i < 10; i++) {
  createBird(
    Math.random() * 70 - 35,
    Math.random() * 20 + 4,
    Math.random() * -140
  );
}

// --------------------------------------------------
// controls
// --------------------------------------------------

const keys = {};

window.addEventListener("keydown", (e) => {
  keys[e.key] = true;
});

window.addEventListener("keyup", (e) => {
  keys[e.key] = false;
});

// --------------------------------------------------
// helpers
// --------------------------------------------------

function lerp(a, b, t) {
  return a + (b - a) * t;
}

function clamp(value, min, max) {
  return Math.max(min, Math.min(max, value));
}

function easeOutCubic(t) {
  return 1 - Math.pow(1 - t, 3);
}

// --------------------------------------------------
// pose
// --------------------------------------------------

function setStandingPose() {
  man.rotation.x = 0;
  man.rotation.y = 0;
  man.rotation.z = 0;

  leftArmPivot.rotation.set(0, 0, 0);
  rightArmPivot.rotation.set(0, 0, 0);

  leftLegPivot.rotation.set(0, 0, 0);
  rightLegPivot.rotation.set(0, 0, 0);
}

function setFlyingPose(floatMotion = 0, headDiveValue = 0, bodyDiveValue = 0, legLagValue = 0, kneeLagValue = 0) {
  // サラリーマン本体の飛行姿勢。
  //
  // 下降時の順番：
  // 1. 頭が先に下を向く
  // 2. 胴体が少し遅れて傾く
  // 3. 足がさらに遅れてついてくる
  // 4. 下降が終わると、それぞれ遅れて戻る

  // 頭・上半身の先行感。
  // man は体全体なので、ここでは「頭から入る」ように
  // まず本体の角度を少しだけ強く下げる。
  man.rotation.x =
    -1.18
    - headDiveValue * 0.16
    - bodyDiveValue * 0.10
    + floatMotion * 0.025;

  man.rotation.y = 0;
  man.rotation.z = 0;

  // 腕は胴体より少しだけ遅れて風に流れる。
  leftArmPivot.rotation.x = 0.10 + bodyDiveValue * 0.08;
  rightArmPivot.rotation.x = 0.10 + bodyDiveValue * 0.08;

  leftArmPivot.rotation.y = -0.45;
  rightArmPivot.rotation.y = 0.45;

  leftArmPivot.rotation.z = 0.12 + floatMotion * 0.015;
  rightArmPivot.rotation.z = -0.12 - floatMotion * 0.015;

  // 足は最後に遅れてついてくる。
  // 下降時は一瞬、胴体に置いていかれるように後ろへ流れる。
  const baseLegX = -0.95;

  leftLegPivot.rotation.x = baseLegX - legLagValue * 0.30;
  rightLegPivot.rotation.x = baseLegX - legLagValue * 0.28;

  // 膝関節の代用。
  // 実際には一本脚だが、左右差とZ回転で「関節がある」感じを出す。
  leftLegPivot.rotation.z =
    0.08
    + Math.sin(time * 2.8) * 0.025
    + kneeLagValue * 0.12;

  rightLegPivot.rotation.z =
    -0.08
    - Math.sin(time * 2.8) * 0.025
    - kneeLagValue * 0.12;
}

// --------------------------------------------------
// animation
// --------------------------------------------------

let time = 0;

// 慣性用
let velX = 0;
let velY = 0;

// カメラの左右回り込み用。
// 1 なら右後方、-1 なら左後方。
let cameraSide = 1;
let targetCameraSide = 1;

// 脚の遅れ用。
// 下降時にすぐ反応せず、少し遅れて足がついてくる。
// 下降時の身体遅延用
let headDive = 0;   // 頭は速く反応
let bodyDive = 0;   // 胴体は少し遅れる
let legLag = 0;     // 足はさらに遅れる
let kneeLag = 0;    // 膝っぽい遅れ

function animate() {
  requestAnimationFrame(animate);
  time += 0.016;

  const floatMotion = Math.sin(time * 2.2);

  // --------------------------------------------------
  // takeoff
  // --------------------------------------------------

  if (time < 4.5) {
    const t = easeOutCubic(time / 4.5);

    flightRig.position.y = lerp(-6, 4, t);

    // 離陸中はまだ進行方向を変えない
    flightRig.rotation.x = 0;
    flightRig.rotation.y = 0;
    flightRig.rotation.z = 0;

    // 立ち姿勢から飛行姿勢へ
    man.rotation.x = lerp(0, -1.18, t);
    man.rotation.z = Math.sin(time * 2.0) * 0.015 * t;

    // 腕を広げる
    leftArmPivot.rotation.y = lerp(0, -0.45, t);
    rightArmPivot.rotation.y = lerp(0, 0.45, t);
    leftArmPivot.rotation.z = lerp(0, 0.12, t);
    rightArmPivot.rotation.z = lerp(0, -0.12, t);

    // 足を後ろへ流す
    leftLegPivot.rotation.x = lerp(0, -1.35, t);
    rightLegPivot.rotation.x = lerp(0, -1.35, t);
    leftLegPivot.rotation.z = lerp(0, 0.08, t);
    rightLegPivot.rotation.z = lerp(0, -0.08, t);

  } else if (gameState === "playing") {
    // --------------------------------------------------
    // input
    // --------------------------------------------------

    let inputX = 0;
    let inputY = 0;

    if (keys["ArrowLeft"]) inputX -= 1;
    if (keys["ArrowRight"]) inputX += 1;
    if (keys["ArrowUp"]) inputY += 1;
    if (keys["ArrowDown"]) inputY -= 1;

    // ゆっくり加速・減速する
    velX = lerp(velX, inputX * 0.16, 0.08);
    velY = lerp(velY, inputY * 0.16, 0.08);

    // 位置更新
    flightRig.position.x += velX;
    flightRig.position.y += velY;

    flightRig.position.x = clamp(flightRig.position.x, -28, 28);
    flightRig.position.y = clamp(flightRig.position.y, -2, 26);

    // 少し前進している想定。
    // 実際の z 位置は変えず、雲や街を流して前進感を出す。
    const forwardSpeed = 0.24;

    // 進行方向ベクトル。
    // この元コードでは、前方を -Z として扱う。
    const dir = new THREE.Vector3(velX, velY, -forwardSpeed).normalize();

    // 左右旋回
    const targetYaw = Math.atan2(-dir.x, -dir.z);

    // 上下方向。
    // ArrowDown で velY が負になり、機首が下がる。
    const targetPitch = Math.atan2(
      dir.y,
      Math.sqrt(dir.x * dir.x + dir.z * dir.z)
    );

    // 左右移動時のバンク
    const targetRoll = -velX * 1.9;

    // flightRig を進行方向へ向ける
    flightRig.rotation.y = lerp(flightRig.rotation.y, targetYaw, 0.08);
    flightRig.rotation.x = lerp(flightRig.rotation.x, targetPitch, 0.08);
    flightRig.rotation.z = lerp(flightRig.rotation.z, targetRoll, 0.08);

        // 上下移動の強さを 0〜1 に変換
        const descendAmount = clamp(-velY / 0.16, 0, 1);
        const ascendAmount = clamp(velY / 0.16, 0, 1);

        // --------------------------------------------------
        // delayed body chain
        // --------------------------------------------------
        // 頭は速く反応する
        headDive = lerp(headDive, descendAmount, 0.18);

        // 胴体は少し遅れる
        bodyDive = lerp(bodyDive, descendAmount, 0.08);

        // 足はさらに遅れる
        legLag = lerp(legLag, descendAmount, 0.035);

        // 膝っぽい動きは足より少しだけ遅い
        kneeLag = lerp(kneeLag, descendAmount, 0.028);

        // 上昇時は、足を少し戻して伸びる感じにする
        const ascentStretch = ascendAmount * 0.18;

        // 飛行姿勢を反映
        setFlyingPose(
        floatMotion,
        headDive,
        bodyDive,
        Math.max(0, legLag - ascentStretch),
        kneeLag
        );
  } else {
    // DAY OFF 10枚取得後の自動操縦。通常入力はここでは読まない。
    updateAutopilot(floatMotion);
  }

  // --------------------------------------------------
  // DAY OFF cards
  // --------------------------------------------------

  spawnDayOffCards();
  updateDayOffCards();

  // --------------------------------------------------
  // clouds move toward camera
  // --------------------------------------------------

  for (const cloud of clouds) {
    cloud.position.z += 0.30;

    if (cloud.position.z > 25) {
      cloud.position.z = -150;
      cloud.position.x = Math.random() * 90 - 45;
      cloud.position.y = Math.random() * 24 + 1;
    }
  }

  // --------------------------------------------------
  // city moves slowly
  // --------------------------------------------------

  const autopilotElapsed = gameState === "playing" ? 0 : time - autopilotStartedAt;
  const cityFade = gameState === "playing" ? 0 : clamp(autopilotElapsed / 6.5, 0, 1);
  const seaFade = gameState === "playing" ? 0 : clamp((autopilotElapsed - 1.5) / 5.0, 0, 1);

  buildingMat.opacity = 1 - cityFade;
  seaMat.opacity = seaFade;
  horizonMat.opacity = seaFade;
  groundMat.color.lerp(new THREE.Color(0x2b8cc4), seaFade * 0.02);
  scene.fog.color.lerp(new THREE.Color(0xbde8ff), seaFade * 0.02);

  for (const b of buildings) {
    b.position.z += gameState === "playing" ? 0.10 : 0.18;
    b.position.y -= cityFade * 0.018;

    if (b.position.z > 30) {
      if (gameState !== "playing") {
        b.visible = false;
        continue;
      }

      const h = Math.random() * 12 + 3;
      b.geometry.dispose();
      b.geometry = new THREE.BoxGeometry(2, h, 2);

      b.position.x = Math.random() * 110 - 55;
      b.position.y = -8 + h / 2;
      b.position.z = -150;
    }
  }

  // --------------------------------------------------
  // birds
  // --------------------------------------------------

  for (const bird of birds) {
    bird.position.x += 0.12;
    bird.position.z += 0.18;
    bird.rotation.z = Math.sin(time * 8 + bird.position.x) * 0.18;

    if (bird.position.x > 42 || bird.position.z > 25) {
      bird.position.x = -42;
      bird.position.y = Math.random() * 20 + 4;
      bird.position.z = Math.random() * -140;
    }
  }

  // --------------------------------------------------
  // camera
  // --------------------------------------------------

  // 右へ移動している時は左後方から、
  // 左へ移動している時は右後方から見る。
  // 真後ろにならないよう、常に X 方向のオフセットを残す。
  if (time >= 4.5 && gameState === "playing") {
    if (velX > 0.025) {
      targetCameraSide = -1;
    } else if (velX < -0.025) {
      targetCameraSide = 1;
    }

    cameraSide = lerp(cameraSide, targetCameraSide, 0.035);
  }

  const autopilotPullback = gameState === "playing" ? 0 : clamp(autopilotElapsed * 1.5, 0, 18);
  const rearDistance = 7.5 + autopilotPullback;
  const sideDistance = gameState === "playing" ? 3.6 : lerp(3.6, 1.2, clamp(autopilotElapsed / 7, 0, 1));

  const cameraTargetX = flightRig.position.x + cameraSide * sideDistance;
  const cameraTargetY = flightRig.position.y + 2.2 + autopilotPullback * 0.16;
  const cameraTargetZ = flightRig.position.z + rearDistance;

  camera.position.x += (cameraTargetX - camera.position.x) * 0.045;
  camera.position.y += (cameraTargetY - camera.position.y) * 0.045;
  camera.position.z += (cameraTargetZ - camera.position.z) * 0.045;

  // 視線は少し前方へ。
  // これで「真後ろから見ている」感じを避ける。
  camera.lookAt(
    flightRig.position.x + velX * 8.0,
    flightRig.position.y - 0.6 + velY * 2.0,
    flightRig.position.z - 5.5 - autopilotPullback * 1.8
  );

  renderer.render(scene, camera);
}

setStandingPose();
animate();

window.addEventListener("resize", () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
